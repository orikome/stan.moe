name: Fetch Trending Anime

on:
  schedule:
    - cron: "0 */2 * * *" # every 2 hours
  workflow_dispatch: # allow manual runs from GitHub UI

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch trending anime
        run: python scripts/fetch_trending.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/trending.json
          git diff --staged --quiet || (git commit -m "chore: update trending anime [skip ci]" && git push)
