name: Fetch Anime Countdown

on:
  schedule:
    - cron: "30 */3 * * *" # every 3 hours, offset from trending
  workflow_dispatch: # allow manual runs from GitHub UI

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch countdown data and generate pages
        run: python scripts/fetch_countdown.py

      - name: Commit updated data and pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/countdown.json "countdown/*.html" sitemap.xml
          git diff --staged --quiet || (git commit -m "chore: update anime countdown [skip ci]" && git push)
